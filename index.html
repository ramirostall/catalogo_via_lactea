<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVR Distribuciones — Catálogo Mayorista</title>
  <meta name="description" content="Catálogo mayorista de quesos, fiambres, dulces y más. DVR Distribuciones." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── HERO ──────────────────────────────────────────────── -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-noise"></div>
    <div class="hero-content">
      <h1 class="hero-logo">DVR<span>Distribuciones</span></h1>
    </div>
    <p class="hero-subtitle">Catálogo Mayorista</p>
  </header>

  <!-- ── NAV CATEGORÍAS ────────────────────────────────────── -->
  <nav class="nav-cats">
    <div class="nav-cats-inner" id="nav-cats">
      <!-- generado por JS -->
    </div>
  </nav>

  <!-- ── BARRA DE BÚSQUEDA ─────────────────────────────────── -->
  <div class="search-bar-wrapper">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Buscar productos o marcas…"
        autocomplete="off"
      />
    </div>
    <select class="filter-select" id="filter-marca">
      <option value="">Todas las marcas</option>
    </select>
    <span class="results-count" id="results-count">Cargando…</span>
  </div>

  <!-- ── CATÁLOGO PRINCIPAL ────────────────────────────────── -->
  <main class="main">
    <div id="catalogo">
      <!-- generado por JS -->
    </div>
    <div class="no-results" id="no-results">
      <div class="no-results-icon">🔎</div>
      <h3>Sin resultados</h3>
      <p>Probá con otro término o limpiá los filtros.</p>
    </div>
  </main>

  <!-- ── FOOTER ────────────────────────────────────────────── -->
  <footer>
    <strong>DVR Distribuciones</strong> · Quesos y Fiambres Mayorista<br>
    <span style="margin-top:6px;display:inline-block">Los precios son orientativos y pueden variar. Consultá por WhatsApp para confirmar.</span>
  </footer>

  <!-- ── WHATSAPP ──────────────────────────────────────────── -->
